<style>
  :root {
    --cream: #f5f0e8;
    --gold: #c9a96e;
    --gold-light: #e8d5a3;
    --dark: #1a1410;
    --brown: #3d2b1f;
    --text: #2c1f14;
    --muted: #8a7060;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background-color: var(--cream);
    color: var(--text);
    font-family: 'Montserrat', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 999;
    opacity: 0.5;
  }

  /* Decorative corner flourishes */
  .corner {
    position: fixed;
    width: 120px;
    height: 120px;
    opacity: 0.15;
    pointer-events: none;
    z-index: 1;
  }
  .corner svg { width: 100%; height: 100%; }
  .corner-tl { top: 0; left: 0; }
  .corner-tr { top: 0; right: 0; transform: scaleX(-1); }
  .corner-bl { bottom: 0; left: 0; transform: scaleY(-1); }
  .corner-br { bottom: 0; right: 0; transform: scale(-1); }

  .header {
    text-align: center;
    padding: 60px 20px 40px;
    position: relative;
  }

  .header-line {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    margin-bottom: 8px;
  }

  .header-line::before,
  .header-line::after {
    content: '';
    width: 60px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold));
  }
  .header-line::after {
    background: linear-gradient(90deg, var(--gold), transparent);
  }

  .date-tag {
    font-family: 'Montserrat', sans-serif;
    font-weight: 200;
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--gold);
    text-transform: uppercase;
  }

  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(52px, 10vw, 88px);
    line-height: 0.9;
    color: var(--brown);
    letter-spacing: -1px;
  }

  h1 em {
    font-style: italic;
    color: var(--gold);
  }

  .ampersand {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: clamp(32px, 6vw, 56px);
    color: var(--muted);
    display: block;
    line-height: 1;
  }

  .subtitle {
    font-weight: 200;
    font-size: 11px;
    letter-spacing: 5px;
    color: var(--muted);
    text-transform: uppercase;
    margin-top: 16px;
  }

  /* Search section */
  .search-section {
    max-width: 560px;
    margin: 0 auto;
    padding: 20px 24px 60px;
  }

  .search-label {
    display: block;
    font-weight: 300;
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 12px;
    text-align: center;
  }

  .search-wrapper {
    position: relative;
  }

  .search-input {
    width: 100%;
    background: transparent;
    border: none;
    border-bottom: 1.5px solid var(--gold);
    padding: 14px 50px 14px 0;
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 300;
    color: var(--brown);
    outline: none;
    text-align: center;
    letter-spacing: 1px;
    transition: border-color 0.3s;
    caret-color: var(--gold);
  }

  .search-input::placeholder {
    color: var(--gold-light);
    font-style: italic;
  }

  .search-input:focus {
    border-bottom-color: var(--brown);
  }

  /* Result card */
  .result-card {
    margin-top: 40px;
    display: none;
    animation: fadeUp 0.5s ease forwards;
  }

  .result-card.visible { display: block; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .result-inner {
    border: 1px solid var(--gold-light);
    padding: 40px 32px;
    text-align: center;
    position: relative;
    background: rgba(255,255,255,0.4);
  }

  .result-inner::before, .result-inner::after {
    content: '✦';
    position: absolute;
    color: var(--gold);
    font-size: 10px;
  }
  .result-inner::before { top: 12px; left: 50%; transform: translateX(-50%); }
  .result-inner::after { bottom: 12px; left: 50%; transform: translateX(-50%); }

  .result-greeting {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 16px;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .result-name {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 600;
    font-size: 32px;
    color: var(--brown);
    margin-bottom: 24px;
  }

  .result-divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 0 auto 24px;
    max-width: 200px;
  }
  .result-divider::before, .result-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--gold-light);
  }
  .result-divider span {
    color: var(--gold);
    font-size: 10px;
  }

  .result-mesa-label {
    font-weight: 200;
    font-size: 10px;
    letter-spacing: 4px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .result-mesa-num {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: 80px;
    line-height: 1;
    color: var(--gold);
    letter-spacing: -2px;
  }

  .result-mesa-group {
    font-family: 'Montserrat', sans-serif;
    font-weight: 200;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
    margin-top: 4px;
    margin-bottom: 20px;
  }

  .result-note {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 14px;
    color: var(--muted);
    padding: 12px 20px;
    border-top: 1px solid var(--gold-light);
    margin-top: 8px;
  }

  /* No result */
  .no-result {
    margin-top: 40px;
    display: none;
    text-align: center;
    animation: fadeUp 0.4s ease forwards;
  }
  .no-result.visible { display: block; }

  .no-result p {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 20px;
    color: var(--muted);
  }

  /* Guest list (all) */
  .all-results {
    max-width: 560px;
    margin: 0 auto;
    display: none;
  }
  .all-results.visible { display: block; }

  .guest-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 0;
    border-bottom: 1px solid rgba(201,169,110,0.2);
    animation: fadeUp 0.3s ease forwards;
    cursor: pointer;
    transition: background 0.2s;
  }
  .guest-item:hover { background: rgba(201,169,110,0.05); padding-left: 8px; padding-right: 8px; }

  .guest-item-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    color: var(--brown);
  }

  .guest-item-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .guest-item-group {
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
  }

  .guest-item-mesa {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px;
    font-weight: 300;
    color: var(--gold);
    min-width: 32px;
    text-align: right;
  }

  /* Decorative footer */
  .footer {
    text-align: center;
    padding: 40px 20px 60px;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--gold-light);
    text-transform: uppercase;
  }

  .ornament {
    font-size: 20px;
    color: var(--gold);
    opacity: 0.4;
    display: block;
    margin-bottom: 12px;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--cream); }
  ::-webkit-scrollbar-thumb { background: var(--gold-light); border-radius: 2px; }
</style>
</head>

function normalize(str) {
  return str.toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .replace(/[^a-z0-9 ]/g, '')
    .trim();
}

const input = document.getElementById('searchInput');
const resultCard = document.getElementById('resultCard');
const noResult = document.getElementById('noResult');
const allResults = document.getElementById('allResults');
const guestList = document.getElementById('guestList');

function showGuest(guest) {
  document.getElementById('resultName').textContent = guest.name;
  document.getElementById('resultMesa').textContent = guest.mesa;
  document.getElementById('resultGroup').textContent = guest.group;
  const noteEl = document.getElementById('resultNote');
  if (guest.note) {
    noteEl.textContent = '🍽 ' + guest.note;
    noteEl.style.display = 'block';
  } else {
    noteEl.style.display = 'none';
  }
  resultCard.classList.remove('visible');
  void resultCard.offsetWidth;
  resultCard.classList.add('visible');
  noResult.classList.remove('visible');
  allResults.classList.remove('visible');
}

input.addEventListener('input', () => {
  const q = normalize(input.value);

  if (q.length < 2) {
    resultCard.classList.remove('visible');
    noResult.classList.remove('visible');
    allResults.classList.remove('visible');
    return;
  }

  const matches = guests.filter(g => normalize(g.name).includes(q));

  if (matches.length === 1) {
    showGuest(matches[0]);
    allResults.classList.remove('visible');
  } else if (matches.length > 1) {
    resultCard.classList.remove('visible');
    noResult.classList.remove('visible');
    allResults.classList.add('visible');
    guestList.innerHTML = matches.map(g => `
      <div class="guest-item" onclick="selectGuest('${g.name}')">
        <span class="guest-item-name">${g.name}</span>
        <div class="guest-item-right">
          <span class="guest-item-group">${g.group}</span>
          <span class="guest-item-mesa">${g.mesa}</span>
        </div>
      </div>
    `).join('');
  } else {
    resultCard.classList.remove('visible');
    noResult.classList.add('visible');
    allResults.classList.remove('visible');
  }
});

function selectGuest(name) {
  const guest = guests.find(g => g.name === name);
  if (guest) {
    input.value = guest.name;
    showGuest(guest);
  }
}
